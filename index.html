<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "HEAD Bikes 2026",
  "description": "The complete HEAD 2026 bike range — MTB, road, gravel, hybrid, e-bikes and kids' bikes with full specifications and prices.",
  "publisher": { "@type": "Organization", "name": "HEAD" }
}

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --paper: #f4f3ef;
  --ink: #14181c;
  --rule: #14181c;
  --muted: #6b7178;
  --accent: #00b2ca;       /* HEAD cyan */
  --accent-dark: #007e91;
  --warn: #c8401a;
  --card: #fcfbf8;
  --mono: 'IBM Plex Mono', monospace;
  --disp: 'Barlow Condensed', sans-serif;
  --pad-x: clamp(14px, 4vw, 32px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--paper); -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--mono);
  color: var(--ink);
  font-size: 13px;
  background:
    repeating-linear-gradient(0deg, transparent 0 31px, rgba(20,24,28,.035) 31px 32px),
    var(--paper);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---------- header ---------- */
header {
  border-bottom: 3px solid var(--rule);
  padding: 24px var(--pad-x) 18px;
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 24px;
  position: sticky; top: 0; z-index: 10;
  background: var(--paper);
}
header h1 {
  font-family: var(--disp);
  font-weight: 700; font-size: clamp(28px, 7vw, 42px); line-height: .9;
  text-transform: uppercase; letter-spacing: .02em;
}
header h1 .slash { color: var(--accent); }
header .count {
  margin-left: auto; font-family: var(--disp); font-size: 28px; font-weight: 600;
  border: 2px solid var(--ink); padding: 2px 14px; background: var(--card);
}
header .count b { color: var(--accent-dark); }

/* ---------- controls ---------- */
.controls {
  display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center;
  padding: 16px var(--pad-x); border-bottom: 1px solid var(--rule);
  background: var(--card);
}
.controls input[type=search], .controls select {
  font-family: var(--mono); font-size: 13px;
  border: 2px solid var(--ink); background: var(--paper);
  padding: 7px 12px; outline: none; max-width: 100%;
}
.controls input[type=search] { flex: 1 1 260px; min-width: 0; }
.controls select { flex: 0 1 auto; min-width: 0; }
.controls input[type=search]:focus, .controls select:focus { border-color: var(--accent-dark); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-family: var(--disp); font-size: 16px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em;
  border: 2px solid var(--ink); background: var(--paper);
  padding: 4px 14px; cursor: pointer; user-select: none;
  transition: background .12s, color .12s;
}
.chip:hover { background: #e8e6df; }
.chip.on { background: var(--ink); color: var(--paper); }
.chip.on::before { content: '■ '; color: var(--accent); }

/* ---------- grid ---------- */
main {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(340px, 100%), 1fr));
  gap: 22px; padding: 28px var(--pad-x) 64px;
}
.bike {
  background: var(--card);
  border: 2px solid var(--ink);
  box-shadow: 5px 5px 0 rgba(20,24,28,.85);
  display: flex; flex-direction: column;
  min-width: 0;
}
.bike-head {
  display: flex; align-items: baseline; gap: 10px;
  padding: 12px 16px 10px;
  border-bottom: 2px solid var(--ink);
  background: linear-gradient(90deg, var(--ink) 0, var(--ink) 6px, transparent 6px);
}
.bike-head h2 {
  font-family: var(--disp); font-size: 26px; font-weight: 700;
  text-transform: uppercase; line-height: 1; letter-spacing: .01em;
  min-width: 0; overflow-wrap: anywhere;
}
.bike-head .wheel { color: var(--accent-dark); font-weight: 600; white-space: nowrap; }
.bike-head .price {
  margin-left: auto; font-family: var(--disp);
  font-size: 24px; font-weight: 700; white-space: nowrap;
}
.bike-head .price small { font-size: 13px; color: var(--muted); font-weight: 500; }

.bike-img {
  position: relative;
  background: #fff;
  border-bottom: 1px solid var(--rule);
  padding: 10px 14px 4px;
  text-align: center;
}
.bike-img img.main {
  max-width: 100%; height: 170px; object-fit: contain;
}
.bike-img .alts {
  position: absolute; top: 6px; right: 6px;
  display: flex; flex-direction: column; gap: 4px;
}
.bike-img .alts img {
  width: 48px; height: 36px; object-fit: contain;
  background: #fff; border: 1px solid var(--ink); padding: 2px;
  cursor: pointer; transition: transform .1s;
}
.bike-img .alts img:hover { transform: scale(1.12); border-color: var(--accent-dark); }
.tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px 16px 0; }
.tag {
  font-size: 10.5px; letter-spacing: .03em;
  border: 1px solid var(--ink); padding: 2px 8px; background: var(--paper);
}
.tag.id { background: var(--ink); color: var(--paper); }
.tag.badge { background: var(--accent); border-color: var(--accent-dark); color: #04313a; font-weight: 600; }

.specs { padding: 12px 16px 16px; }
.specs h3 {
  font-family: var(--disp); font-size: 15px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent-dark);
  margin: 6px 0 4px;
}
table { width: 100%; border-collapse: collapse; }
td {
  vertical-align: top; padding: 3px 0;
  border-bottom: 1px dotted #c9c5ba;
  font-size: 12px; line-height: 1.45;
}
td.k { width: 34%; color: var(--muted); padding-right: 10px; }
td.v { font-weight: 500; overflow-wrap: anywhere; }
td.v:empty::after, td.v.blank::after { content: '—'; color: #c9c5ba; }
details summary {
  cursor: pointer; list-style: none;
  font-family: var(--disp); font-size: 15px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent-dark); margin: 10px 0 4px;
}
details summary::before { content: '+ '; }
details[open] summary::before { content: '− '; }
details summary:hover { color: var(--ink); }

.empty {
  grid-column: 1 / -1; text-align: center; padding: 80px 0;
  font-family: var(--disp); font-size: 30px; color: var(--muted); text-transform: uppercase;
}
.error-box {
  margin: 40px var(--pad-x); padding: 24px; border: 2px solid var(--warn); color: var(--warn);
  background: var(--card); font-size: 14px;
}
footer {
  border-top: 3px solid var(--rule); padding: 18px var(--pad-x);
  color: var(--muted); font-size: 11px; display: flex; gap: 8px 24px; flex-wrap: wrap;
}

@media (max-width: 600px) {
  header { position: static; }
  header .count { font-size: 22px; }
  .bike-head h2 { font-size: 22px; }
  .bike-head .price { font-size: 20px; }
}
</style>
</head>
<body>

<header>
  <h1>HEAD<span class="slash">//</span>Bikes 2026</h1>
  <span class="count"><b id="shown">0</b> / <span id="total">0</span></span>
</header>

<div class="controls">
  <input id="q" type="search" placeholder="search model, ID, any spec…" autocomplete="off" aria-label="Search bikes">
  <div class="chips" id="cats"></div>
  <select id="subcat" aria-label="Filter by subcategory"><option value="">all subcategories</option></select>
  <select id="sort" aria-label="Sort bikes">
    <option value="page">sort: catalogue order</option>
    <option value="price-asc">sort: price ↑</option>
    <option value="price-desc">sort: price ↓</option>
    <option value="model">sort: model A–Z</option>
  </select>
</div>

<main id="grid"></main>

<footer id="stats"></footer>

<script>
let DATA = null;
const state = { q: '', cat: '', sub: '', sort: 'page' };

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

fetch('bikes.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(d => { DATA = d; init(); })
  .catch(() => {
    document.body.insertAdjacentHTML('beforeend',
      `<div class="error-box">Sorry — the bike catalogue couldn’t be loaded right now. Please refresh the page or try again later.</div>`);
  });

function init() {
  state.q = (new URLSearchParams(location.search).get('q') || '').toLowerCase();
  $('q').value = state.q;
  $('total').textContent = DATA.bikes.length;
  const cats = [...new Set(DATA.bikes.map(b => b.category))];
  $('cats').innerHTML = ['<span class="chip on" data-cat="">All</span>']
    .concat(cats.map(c => `<span class="chip" data-cat="${esc(c)}">${esc(c)}</span>`)).join('');
  $('cats').addEventListener('click', e => {
    const chip = e.target.closest('.chip'); if (!chip) return;
    state.cat = chip.dataset.cat;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c === chip));
    fillSubcats(); state.sub = ''; $('subcat').value = '';
    render();
  });
  fillSubcats();
  $('q').addEventListener('input', e => { state.q = e.target.value.toLowerCase(); render(); });
  $('subcat').addEventListener('change', e => { state.sub = e.target.value; render(); });
  $('sort').addEventListener('change', e => { state.sort = e.target.value; render(); });
  $('grid').addEventListener('click', e => {
    const thumb = e.target.closest('.alts img'); if (!thumb) return;
    const main = thumb.closest('.bike-img').querySelector('img.main');
    [main.src, thumb.src] = [thumb.src, main.src];
  });
  $('stats').innerHTML =
    `<span>HEAD Bikes 2026</span>` +
    `<span>${DATA.bikes.length} models · all prices in CZK</span>` +
    `<span>Specifications and prices are subject to change.</span>`;
  injectStructuredData(DATA.bikes);
  render();
}

function fillSubcats() {
  const pool = DATA.bikes.filter(b => !state.cat || b.category === state.cat);
  const subs = [...new Set(pool.map(b => b.subcategory).filter(Boolean))].sort();
  $('subcat').innerHTML = '<option value="">all subcategories</option>'
    + subs.map(s => `<option>${esc(s)}</option>`).join('');
}

function haystack(b) {
  return [b.model, b.id, b.subcategory, b.wheel_size,
    ...b.short_info.flatMap(r => [r.label, r.value]),
    ...b.specifications.flatMap(r => [r.label, r.value])
  ].join(' ').toLowerCase();
}

function render() {
  let list = DATA.bikes.filter(b =>
    (!state.cat || b.category === state.cat) &&
    (!state.sub || b.subcategory === state.sub) &&
    (!state.q || haystack(b).includes(state.q))
  );
  const by = {
    'page': (a, b) => a.page - b.page || a.column.localeCompare(b.column),
    'price-asc': (a, b) => (a.price_czk ?? 1e12) - (b.price_czk ?? 1e12),
    'price-desc': (a, b) => (b.price_czk ?? -1) - (a.price_czk ?? -1),
    'model': (a, b) => a.model.localeCompare(b.model),
  };
  list.sort(by[state.sort]);

  $('shown').textContent = list.length;
  $('grid').innerHTML = list.length
    ? list.map(card).join('')
    : '<div class="empty">no bikes match</div>';
}

function rows(pairs) {
  return pairs.map(r =>
    `<tr><td class="k">${esc(r.label)}</td><td class="v${r.value ? '' : ' blank'}">${esc(r.value)}</td></tr>`
  ).join('');
}

function card(b) {
  return `<article class="bike">
    <div class="bike-head">
      <h2>${esc(b.model)}</h2>
      ${b.wheel_size ? `<span class="wheel">${esc(b.wheel_size)}</span>` : ''}
      <span class="price">${b.price_czk != null ? esc(b.price_raw) + ' <small>CZK</small>' : '<small>no price</small>'}</span>
    </div>
    ${b.image ? `<div class="bike-img">
      <img class="main" src="${esc(b.image)}" alt="HEAD ${esc(b.model)} ${esc(b.category)} bike" loading="lazy">
      ${b.thumbnails?.length ? `<div class="alts">${b.thumbnails.map(t =>
        `<img src="${esc(t)}" alt="HEAD ${esc(b.model)} variant" loading="lazy">`).join('')}</div>` : ''}
    </div>` : ''}
    <div class="tags">
      ${b.id ? `<span class="tag id">ID ${esc(b.id)}</span>` : ''}
      ${b.frame_badge ? `<span class="tag badge">${esc(b.frame_badge)}</span>` : ''}
      <span class="tag">${esc(b.category)}</span>
      ${b.subcategory ? `<span class="tag">${esc(b.subcategory)}</span>` : ''}
    </div>
    <div class="specs">
      ${b.short_info.length ? `<h3>Short info</h3><table>${rows(b.short_info)}</table>` : ''}
      ${b.specifications.length
        ? `<details><summary>Specifications (${b.specifications.length})</summary><table>${rows(b.specifications)}</table></details>`
        : ''}
    </div>
  </article>`;
}

function injectStructuredData(bikes) {
  const data = {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "HEAD Bikes 2026",
    "numberOfItems": bikes.length,
    "itemListElement": bikes.map((b, i) => {
      const product = {
        "@type": "Product",
        "name": b.model,
        "category": b.category,
        "brand": { "@type": "Brand", "name": "HEAD" }
      };
      if (b.id) product.sku = b.id;
      if (b.image) product.image = new URL(b.image, location.href).href;
      if (b.price_czk != null) product.offers = {
        "@type": "Offer", "price": b.price_czk, "priceCurrency": "CZK",
        "availability": "https://schema.org/InStock"
      };
      return { "@type": "ListItem", "position": i + 1, "item": product };
    })
  };
  const tag = document.createElement('script');
  tag.type = 'application/ld+json';
  tag.textContent = JSON.stringify(data).replace(/</g, '\\u003c');
  document.head.appendChild(tag);
}
</script>
</body>
</html>
